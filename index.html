<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>coralcake's playground</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="menu-left">
            <div class="switch-lang">
                <img src="/svg/flag-uk.svg" alt="English" class="flag-icon" id="flag1" height=14>
                <img src="/svg/flag-pl.svg" alt="Polish" class="flag-icon darkened" id="flag2" height=14>
            </div>
        </div>
        
        <div class="logo-center">
            <a href="https://coralcake.github.io">
                <img src="/img/avatar-coralcake-40x40.png" alt="Logo" height=40>
            </a>
            <span class="logo-text">my playground</span>
        </div>
        
        <div class="switch-right">
            <img id="modeImage" src="/svg/mode-light.svg" width=20 alt="Light/Dark Mode">
            <label class="switch-mode">
                <input type="checkbox" id="modeToggle">
                <span class="slider"></span>
            </label>
        </div>
    </header>
    
    <main>
        <section id="grid">
            <div class="nav-section">
                <div class="nav-title">Drawing idea generators</div>
                <a href="/pages/generators.html#generator-8">8-category generator</a>
                <a href="/pages/generators.html#generator-10">10-category generator</a>
                <a href="/pages/generators.html#generator-textures">Texture generator</a>
            </div>
            <div class="nav-section">
                <div class="nav-title">Art database</div>
                <a href="/pages/art-database.html#art-traditional">Traditional artworks</a>
                <a href="/pages/art-database.html#art-digital">Digital artworks</a>
            </div>
            <div class="nav-section">
                <div class="nav-title">Follow me</div>
                <a href="https://github.com/coralcake" class="icon">
                    <img id="githubIcon" src="/svg/GitHub_Invertocat_Black.svg" alt="GitHub" height=20>
                    on GitHub: @coralcake
                </a>
            </div>
        </section>
    </main>
    
    <div id="overlay" onclick="hideMenu()"></div>
    
    <footer>
        <span class="footer-text">© 2026 coralcake</span>
    </footer>
    
    <script src="/js/menu-mobile.js"></script>
    <script src="/js/dark-light-mode.js"></script>
    <script src="/js/darkening-image.js"></script>
</body>
</html>
