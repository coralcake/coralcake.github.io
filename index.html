<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>coralcake's playground</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="icon" href="/favicon-32x32.png" type="image/png" sizes="32x32" >
    <link rel="icon" href="/favicon-16x16.png" type="image/png" sizes="16x16">
</head>
<body>
    <script>
        (function(){
            if (localStorage.getItem('darkMode') === 'enabled') {
                document.body.style.transition = 'none';
                document.body.classList.add('dark-mode');
                
                document.addEventListener('DOMContentLoaded', () => {
                    document.body.style.transition = '';
                })
            }
        })();
    </script>
    <header>
        <div class="menu-left">
            <div class="switch-lang">
                <img id="flag1" src="/svg/flag-uk.svg" alt="English" class="flag-icon" height=14>
                <img id="flag2" src="/svg/flag-pl.svg" alt="Polish" class="flag-icon darkened" height=14>
            </div>
        </div>
        
        <div class="logo-center">
            <a href="https://coralcake.github.io">
                <img src="/svg/avatar-coralcake.svg" alt="Logo" height=40 width=40>
            </a>
            <span class="logo-text">my playground</span>
        </div>
        
        <div class="switch-right">
            <img id="modeImage" src="/svg/mode-light.svg" alt="Light/Dark Mode" height=20 width=20>
            <label class="switch-mode">
                <input type="checkbox" id="modeToggle">
                <span class="slider"></span>
            </label>
        </div>
    </header>
    
    <main>
        <section>
            <h1>Drawing idea generators</h1>
            <div class="tiles">
                <a class="tile" href="/pages/generators.html#generator-8">
                    <h3>8-category generator</h3>
                </a>
                <a class="tile" href="/pages/generators.html#generator-10">
                    <h3>10-category generator</h3>
                </a>
                <a class="tile" href="/pages/generators.html#generator-chaos">
                    <h3>Chaos-based generator</h3>
                </a>
                <a class="tile" href="/pages/generators.html#generator-3-act">
                    <h3>3-act generator</h3>
                </a>
                <a class="tile" href="/pages/generators.html#generator-archetype">
                    <h3>Archetype generator</h3>
                </a>
                <a class="tile" href="/pages/generators.html#generator-textures">
                    <h3>Texture generator</h3>
                </a>
            </div>
            
            <h1>Art database</h1>
            <div class="tiles">
                <a class="tile" href="/pages/art-database.html#art-traditional">
                    <h3>🛠️ Traditional artworks</h3>
                </a>
                <a class="tile" href="/pages/art-database.html#art-digital">
                    <h3>🛠️ Digital artworks</h3>
                </a>
            </div>
            
            <h1>Follow me</h1>
            <a href="https://github.com/coralcake" class="follow">
                <img id="githubIcon" src="/svg/GitHub_Invertocat_Black.svg" alt="GitHub" height=20 width=20>
                <span>on GitHub: @coralcake</span>
            </a>
        </section>
    </main>
    
    <footer>
        <span class="footer-text">© 2026 coralcake</span>
    </footer>
    
    <script src="/js/dark-light-mode.js"></script>
    <script src="/js/darkening-image.js"></script>
</body>
</html>
