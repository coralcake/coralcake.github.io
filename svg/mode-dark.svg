<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Maska do wycięcia cienia z księżyca -->
  <defs>
    <mask id="moon-mask">
      <circle cx="50" cy="50" r="30" fill="white" />
      <circle cx="65" cy="40" r="20" fill="black" />
    </mask>
  </defs>
  
  <!-- Księżyc z nałożoną maską -->
  <circle cx="50" cy="50" r="30" fill="#e0e0e0" mask="url(#moon-mask)" />
</svg>
