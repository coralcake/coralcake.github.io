<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Sun's center -->
  <circle cx="50" cy="50" r="20" fill="#555555" />
  <!-- Sun's rays -->
  <!-- góra -->
  <line x1="50" y1="10" x2="50" y2="25" stroke="#555555" stroke-width="10"/>
  <!-- dół -->
  <line x1="50" y1="90" x2="50" y2="75" stroke="#555555" stroke-width="10"/>
  <!-- lewy -->
  <line x1="10" y1="50" x2="25" y2="50" stroke="#555555" stroke-width="10"/>
  <!-- prawy -->
  <line x1="90" y1="50" x2="75" y2="50" stroke="#555555" stroke-width="10"/>
  <!-- góra-lewy -->
  <line x1="20" y1="20" x2="30" y2="30" stroke="#555555" stroke-width="10"/>
  <!-- góra-prawy -->
  <line x1="80" y1="20" x2="70" y2="30" stroke="#555555" stroke-width="10"/>
  <!-- dół-lewy -->
  <line x1="20" y1="80" x2="30" y2="70" stroke="#555555" stroke-width="10"/>
  <!-- dół-prawy -->
  <line x1="80" y1="80" x2="70" y2="70" stroke="#555555" stroke-width="10"/>
</svg>
